<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... | KODDO Blog</title>
    
    <!-- SEO Dinámico -->
    <meta name="description" id="meta-description" content="KODDO Engineering Blog - Insights sobre IA, Datos y Software.">
    <meta property="og:title" id="og-title" content="KODDO Blog">
    <meta property="og:description" id="og-description" content="Exploramos el futuro de la ingeniería de datos y el desarrollo móvil.">
    <meta property="og:image" id="og-image" content="/images/logo-red-nobk.png">
    <meta property="og:type" content="article">
    
    <!-- LLM Context & Citations -->
    <link rel="alternate" type="text/markdown" id="llm-link" href="">
    
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asimovian&family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
    
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        .post-container { max-width: 900px; margin: 0 auto; padding: 180px 20px 100px; }
        .post-meta { color: var(--color-accent); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; display: block; }
        .post-title { font-family: var(--font-family-heading); font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin-bottom: 2rem; color: white; }
        .post-date { color: var(--color-text-secondary); display: block; margin-bottom: 3rem; font-size: 0.9rem; }
        
        /* Markdown Styles */
        .post-content { font-size: 1.15rem; line-height: 1.8; color: var(--color-text-secondary); }
        .post-content h1, .post-content h2, .post-content h3 { color: white; margin: 2.5rem 0 1.5rem; font-family: var(--font-family-heading); }
        .post-content h1 { font-size: 2.5rem; }
        .post-content h2 { font-size: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        .post-content h3 { font-size: 1.5rem; }
        .post-content p { margin-bottom: 1.5rem; }
        .post-content ul, .post-content ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
        .post-content li { margin-bottom: 0.5rem; }
        
        /* Code Blocks */
        .post-content pre { background: #0d1117; border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; margin: 2rem 0; overflow-x: auto; }
        .post-content code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.9rem; }
        .post-content :not(pre) > code { background: rgba(212, 59, 49, 0.1); color: var(--color-accent); padding: 0.2rem 0.4rem; border-radius: 4px; }
        
        .back-link { display: inline-flex; align-items: center; gap: 10px; color: white; text-decoration: none; margin-bottom: 3rem; font-weight: 600; transition: var(--transition-smooth); }
        .back-link:hover { color: var(--color-accent); transform: translateX(-5px); }
    </style>
</head>
<body>
    <div class="scroll-progress" aria-hidden="true"></div>
    <div class="cursor" aria-hidden="true"></div>
    
    <div id="app">
        <header class="site-header scrolled">
            <div class="header-content">
                <div class="logo">
                    <a href="/"><img src="/images/logo-red-nobk.png" alt="KODDO" class="logo-img" style="height: 50px;"></a>
                </div>
            </div>
        </header>

        <main class="post-container">
            <a href="/blog.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                Volver al Blog
            </a>
            <div id="post-render">
                <p>Cargando artículo...</p>
            </div>
        </main>
    </div>

    <script type="module">
        async function loadPost() {
            // Get postId from directory name instead of query param
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const postId = pathParts[pathParts.length - 1];
            
            try {
                const response = await fetch('/blog/posts.json');
                const posts = await response.json();
                const post = posts.find(p => p.id === postId);
                
                if (post) {
                    document.title = `${post.title} | KODDO Blog`;
                    
                    // Actualizar SEO y Metadatos para LLMs
                    document.getElementById('meta-description').setAttribute('content', post.excerpt);
                    document.getElementById('og-title').setAttribute('content', post.title);
                    document.getElementById('og-description').setAttribute('content', post.excerpt);
                    document.getElementById('og-image').setAttribute('content', post.image);
                    
                    // JSON-LD para Google y LLMs (Citas estructuradas)
                    const schema = {
                        "@context": "https://schema.org",
                        "@type": "BlogPosting",
                        "headline": post.title,
                        "image": post.image,
                        "datePublished": post.date,
                        "author": {
                            "@type": "Organization",
                            "name": post.author
                        },
                        "description": post.excerpt,
                        "mainEntityOfPage": {
                            "@type": "WebPage",
                            "@id": window.location.href
                        }
                    };
                    const script = document.createElement('script');
                    script.type = 'application/ld+json';
                    script.text = JSON.stringify(schema);
                    document.head.appendChild(script);

                    // Render Markdown with marked.js
                    const contentHtml = marked.parse(post.content);
                    
                    document.getElementById('post-render').innerHTML = `
                        <span class="post-meta">${post.category}</span>
                        <h1 class="post-title">${post.title}</h1>
                        <span class="post-date">Publicado el ${post.date} por ${post.author}</span>
                        <div class="post-content">
                            ${contentHtml}
                        </div>
                    `;
                    
                    // Trigger Syntax Highlighting
                    hljs.highlightAll();
                } else {
                    document.getElementById('post-render').innerHTML = "<h1>Artículo no encontrado</h1>";
                }
            } catch (e) {
                console.error(e);
            }
        }
        loadPost();
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
